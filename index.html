<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚖️ Gilde & Licenze di Arcamis</title>
<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=IM+Fell+English:ital@0;1&family=Uncial+Antiqua&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1510; --bg2: #211c15; --bg3: #28211a;
    --panel: #231e17; --panel2: #2d2620;
    --border: #5a3e1e; --border2: #7a5428;
    --gold: #c8a050; --gold2: #e0b860; --gold3: #f0d080;
    --amber: #d4954a; --red2: #c04040; --green2: #4a9a58;
    --blue2: #5a8ad8; --purple: #8a50b0; --purple2: #a070c8;
    --text: #f0e0c0; --text2: #c8a878; --text3: #806848;
    --common: #60b840; --uncommon: #50a0d8;
    --rare: #a060d8; --very-rare: #d88040; --legendary: #d8b020;
    --shadow: 0 4px 16px rgba(0,0,0,.6);
    --glow: 0 0 16px rgba(200,160,80,.15);
    --header-bg-start: #0e0c08;
    --header-bg-end: #1a1510;
    --guide-hero-end: #2a2418;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); }

  /* ── HEADER ── */
  header {
    background: linear-gradient(180deg, var(--header-bg-start) 0%, var(--header-bg-end) 100%);
    border-bottom: 2px solid var(--border2);
    padding: 20px 24px 16px;
    text-align: center;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 32px rgba(0,0,0,.8);
  }
  header h1 {
    font-family: 'MedievalSharp', serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight: 900; color: var(--gold2);
    letter-spacing: .06em;
    text-shadow: 0 0 30px rgba(201,168,76,.4), 0 2px 4px rgba(0,0,0,.8);
    margin-bottom: 4px;
  }
  header p { font-family: 'Uncial Antiqua', serif; font-size: .85rem; color: var(--text3); letter-spacing: .12em; text-transform: uppercase; }

  /* ── TABS ── */
  .tabs {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 16px 20px 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    position: sticky; top: 97px; z-index: 90;
  }
  .tab-btn {
    background: var(--panel); border: 1px solid var(--border);
    color: var(--text2); font-family: 'Uncial Antiqua', serif;
    font-size: .78rem; letter-spacing: .08em;
    padding: 7px 14px; border-radius: 4px 4px 0 0;
    cursor: pointer; transition: all .2s; white-space: nowrap;
  }
  .tab-btn:hover { background: var(--panel2); color: var(--gold2); border-color: var(--border2); }
  .tab-btn.active {
    background: var(--bg3); color: var(--gold2); border-color: var(--gold);
    border-bottom-color: var(--bg3); position: relative; bottom: -1px;
    box-shadow: 0 -2px 12px rgba(201,168,76,.12);
  }
  .tab-btn.active-amber { border-color: var(--amber) !important; color: var(--amber) !important; }

  /* ── LAYOUT ── */
  .main { display: flex; min-height: calc(100vh - 160px); }

  /* ── SIDENAV ── */
  .sidenav {
    width: 210px; flex-shrink: 0;
    background: var(--bg2); border-right: 1px solid var(--border);
    padding: 20px 0;
    position: sticky; top: calc(97px + 44px);
    max-height: calc(100vh - 145px); overflow-y: auto;
  }
  .sidenav-section { padding: 0 0 16px; }
  .sidenav-title {
    font-family: 'Uncial Antiqua', serif; font-size: .65rem;
    letter-spacing: .15em; text-transform: uppercase; color: var(--text3);
    padding: 0 16px 8px;
  }
  .sidenav-btn {
    display: block; width: 100%; background: none; border: none;
    color: var(--text2); font-family: 'IM Fell English', serif;
    font-size: .92rem; text-align: left; padding: 7px 20px;
    cursor: pointer; transition: all .15s;
    border-left: 3px solid transparent;
  }
  .sidenav-btn:hover { color: var(--gold); background: rgba(201,168,76,.05); }
  .sidenav-btn.active { color: var(--gold2); border-left-color: var(--gold); background: rgba(201,168,76,.08); font-weight: 600; }

  /* ── CONTENT ── */
  .content { flex: 1; padding: 28px 28px; overflow-x: auto; max-width: 960px; }

  /* ── HERO / INTRO ── */
  .page-hero {
    background: linear-gradient(135deg, var(--panel) 0%, var(--guide-hero-end) 100%);
    border: 1px solid var(--border2); border-radius: 8px;
    padding: 32px 36px; margin-bottom: 28px;
    box-shadow: var(--shadow), var(--glow); position: relative; overflow: hidden;
  }
  .page-hero::before {
    position: absolute; right: 24px; top: 50%; transform: translateY(-50%);
    font-size: 6rem; opacity: .06; pointer-events: none;
  }
  .page-hero.gilde::before { content: '🏛️'; }
  .page-hero.licenze::before { content: '⚖️'; }
  .page-hero h2 {
    font-family: 'MedievalSharp', serif; font-size: 1.55rem; color: var(--gold2);
    margin-bottom: 10px; text-shadow: 0 0 24px rgba(201,168,76,.35);
  }
  .page-hero p { color: var(--text2); font-size: .98rem; line-height: 1.65; }

  /* ── SECTION ── */
  .doc-section { margin-bottom: 32px; }
  .doc-section-title {
    font-family: 'Uncial Antiqua', serif; font-size: .82rem;
    letter-spacing: .14em; text-transform: uppercase; color: var(--gold);
    margin-bottom: 14px; padding-bottom: 7px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }

  /* ── CARD GRID ── */
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; padding: 16px 18px;
    transition: border-color .2s, box-shadow .2s;
  }
  .card:hover { border-color: var(--border2); box-shadow: var(--glow); }
  .card.gold-border { border-color: var(--border2); }
  .card h4 {
    font-family: 'Uncial Antiqua', serif; font-size: .88rem;
    color: var(--gold2); margin-bottom: 8px;
  }
  .card p, .card li { font-size: .88rem; color: var(--text2); line-height: 1.55; }
  .card ul { padding-left: 14px; }
  .card li { margin-bottom: 3px; }
  .card .sub { font-size: .78rem; color: var(--text3); font-style: italic; margin-bottom: 6px; display: block; }

  /* ── IMPRESA TYPE CARD ── */
  .impresa-card {
    background: var(--panel); border-radius: 6px;
    border: 1px solid var(--border2); margin-bottom: 20px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .impresa-header {
    padding: 14px 20px; display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .impresa-header h3 {
    font-family: 'Uncial Antiqua', serif; font-size: .98rem; color: var(--gold2); letter-spacing: .05em;
  }
  .impresa-header .patente-badge {
    font-family: 'Uncial Antiqua', serif; font-size: .7rem; letter-spacing: .1em;
    padding: 3px 9px; border-radius: 12px; white-space: nowrap;
    margin-left: auto;
  }
  .pat-pmc  { background: rgba(96,184,64,.15);  color: var(--common);    border: 1px solid rgba(96,184,64,.3); }
  .pat-pmt  { background: rgba(90,138,216,.15); color: var(--uncommon);  border: 1px solid rgba(90,138,216,.3); }
  .pat-pasv { background: rgba(212,149,74,.15); color: var(--amber);     border: 1px solid rgba(212,149,74,.3); }
  .pat-poe  { background: rgba(216,176,32,.15); color: var(--legendary); border: 1px solid rgba(216,176,32,.3); }
  .pat-mista{ background: rgba(138,80,176,.15); color: var(--purple2);   border: 1px solid rgba(138,80,176,.3); }
  .impresa-body { padding: 16px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .impresa-body .info-block p { font-size: .85rem; color: var(--text2); margin-bottom: 4px; }
  .impresa-body .info-block strong { color: var(--gold); }
  .benefit-list, .limit-list { list-style: none; padding: 0; margin-top: 8px; }
  .benefit-list li { font-size: .85rem; color: var(--green2); padding: 3px 0; display: flex; gap: 6px; }
  .benefit-list li::before { content: '✦'; color: var(--gold); flex-shrink: 0; }
  .limit-list li { font-size: .85rem; color: var(--amber); padding: 3px 0; display: flex; gap: 6px; }
  .limit-list li::before { content: '⚠'; flex-shrink: 0; }
  .impresa-body h5 {
    font-family: 'Uncial Antiqua', serif; font-size: .7rem; letter-spacing: .12em;
    text-transform: uppercase; color: var(--text3); margin-bottom: 6px;
  }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; margin-bottom: 24px; }
  table { width: 100%; border-collapse: collapse; font-size: .88rem; }
  thead tr { background: var(--panel2); border-bottom: 2px solid var(--border2); }
  thead th {
    font-family: 'Uncial Antiqua', serif; font-size: .7rem; letter-spacing: .1em;
    text-transform: uppercase; color: var(--gold); padding: 10px 12px;
    text-align: left; white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid rgba(58,47,85,.4); transition: background .15s; }
  tbody tr:hover { background: rgba(201,168,76,.04); }
  tbody td { padding: 9px 12px; color: var(--text2); vertical-align: top; }
  tbody td:first-child { color: var(--text); font-weight: 600; }
  tbody td strong { color: var(--gold); }

  /* highlight row colors for gilda gradi */
  .row-app  td { color: var(--text3) !important; }
  .row-art  td:first-child { color: var(--common) !important; }
  .row-mst  td:first-child { color: var(--uncommon) !important; }
  .row-gran td:first-child { color: var(--legendary) !important; }
  .row-on   td:first-child { color: var(--purple2) !important; }

  /* patente rows */
  .row-pmc  td:first-child { color: var(--common) !important; }
  .row-pmt  td:first-child { color: var(--uncommon) !important; }
  .row-pasv td:first-child { color: var(--amber) !important; }
  .row-poe  td:first-child { color: var(--legendary) !important; }

  /* ── STRUTTURE GRID ── */
  .strutt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .strutt-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 5px; padding: 14px 16px;
    transition: border-color .2s;
  }
  .strutt-card:hover { border-color: var(--border2); }
  .strutt-card h5 { font-family: 'Uncial Antiqua', serif; font-size: .82rem; color: var(--gold2); margin-bottom: 4px; }
  .strutt-card .strutt-cost { font-size: .78rem; color: var(--amber); font-weight: 700; margin-bottom: 6px; }
  .strutt-card p { font-size: .82rem; color: var(--text2); line-height: 1.45; }
  .strutt-card.lv2 { border-left: 3px solid var(--purple); }
  .strutt-card.lv2 h5 { color: var(--purple2); }

  /* ── SANZIONI ── */
  .sanz-lieve    td:first-child { color: var(--common) !important; }
  .sanz-grave    td:first-child { color: var(--amber) !important; }
  .sanz-graviss  td:first-child { color: var(--red2) !important; }
  .sanz-gilda-g  td:first-child { color: var(--purple2) !important; }
  .sanz-gilda-r  td:first-child { color: var(--legendary) !important; }

  /* ── LICENZA CARD ── */
  .licenza-card {
    background: var(--panel); border: 1px solid var(--border2); border-radius: 8px;
    margin-bottom: 22px; overflow: hidden; box-shadow: var(--shadow);
  }
  .licenza-header { padding: 18px 24px; border-bottom: 1px solid var(--border); }
  .licenza-header h3 {
    font-family: 'MedievalSharp', serif; font-size: 1.15rem; margin-bottom: 4px;
  }
  .licenza-header .lh-meta { font-size: .82rem; color: var(--text3); font-style: italic; }
  .licenza-body { padding: 16px 24px 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
  .licenza-block h5 {
    font-family: 'Uncial Antiqua', serif; font-size: .7rem; letter-spacing: .12em;
    text-transform: uppercase; color: var(--text3); margin-bottom: 6px;
  }
  .licenza-block ul { list-style: none; padding: 0; }
  .licenza-block li { font-size: .85rem; color: var(--text2); padding: 2px 0; display: flex; gap: 6px; line-height: 1.4; }
  .licenza-block li::before { content: '·'; color: var(--gold); flex-shrink: 0; }

  /* ── INCHIOSTRI TABLE color dots ── */
  .dot-i { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

  /* ── RULE BOX ── */
  .rules-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-top: 14px; }
  .rule-box { background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 12px 14px; }
  .rule-box h4 { font-family: 'Uncial Antiqua', serif; font-size: .72rem; letter-spacing: .1em; color: var(--gold); margin-bottom: 6px; text-transform: uppercase; }
  .rule-box p, .rule-box li { font-size: .87rem; color: var(--text2); line-height: 1.5; }
  .rule-box ul { padding-left: 14px; }

  /* ── NOTE BOX ── */
  .note-box {
    background: rgba(212,137,26,.07); border: 1px solid rgba(212,137,26,.28);
    border-radius: 5px; padding: 12px 16px;
    font-size: .86rem; color: var(--amber); margin-top: 12px; line-height: 1.5;
  }
  .note-box strong { color: var(--gold2); }

  /* ── GILDA RICONOSCIUTA ── */
  .gilde-table-wrap td:first-child { color: var(--gold) !important; font-style: italic; }
  .gilde-table-wrap td:nth-child(2) { color: var(--text3) !important; }

  /* ── SCROLL ── */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* ── MOBILE DRAWER ── */
  .mobile-nav-btn {
    display: none; position: fixed; bottom: 20px; right: 20px; z-index: 200;
    background: var(--gold2); color: var(--bg); border: none; border-radius: 50%;
    width: 52px; height: 52px; font-size: 1.3rem; cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,.5); align-items: center; justify-content: center;
  }
  .mobile-drawer-overlay { display: none; position: fixed; inset: 0; z-index: 150; background: rgba(0,0,0,.55); }
  .mobile-drawer-overlay.open { display: block; }
  .mobile-drawer {
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 160;
    width: min(280px, 85vw); background: var(--bg2); border-right: 1px solid var(--border2);
    padding: 20px 0 40px; overflow-y: auto;
    transform: translateX(-100%); transition: transform .3s ease;
  }
  .mobile-drawer.open { transform: translateX(0); }
  .mobile-drawer-header {
    padding: 0 16px 16px; border-bottom: 1px solid var(--border); margin-bottom: 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .mobile-drawer-header h3 { font-family: 'Uncial Antiqua', serif; font-size: .8rem; letter-spacing: .12em; text-transform: uppercase; color: var(--gold); }
  .mobile-drawer-close { background: none; border: none; color: var(--text3); font-size: 1.3rem; cursor: pointer; padding: 2px 6px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .sidenav { display: none; }
    .mobile-nav-btn { display: flex; }
    header { padding: 14px 16px 12px; }
    header h1 { font-size: clamp(1.1rem, 5vw, 1.5rem); }
    .tabs { top: 0; position: relative; overflow-x: auto; flex-wrap: nowrap; padding: 10px 12px 0; gap: 4px; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn { font-size: .72rem; padding: 6px 10px; flex-shrink: 0; }
    .main { flex-direction: column; }
    .content { padding: 14px 12px; }
    .impresa-body { grid-template-columns: 1fr; }
    .card-grid { grid-template-columns: 1fr; }
    .strutt-grid { grid-template-columns: 1fr; }
    .licenza-body { grid-template-columns: 1fr; }
    .rules-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>⚖️ Gilde &amp; Licenze di Arcamis ⚖️</h1>
  <p>Imprese · Gilde · Patenti · Camera del Commercio — Arcadia</p>
</header>

<div class="tabs" id="tabs"></div>

<div class="mobile-drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="mobile-drawer" id="mobileDrawer">
  <div class="mobile-drawer-header">
    <h3>📑 Navigazione</h3>
    <button class="mobile-drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <nav id="mobileDrawerNav"></nav>
</div>
<button class="mobile-nav-btn" id="mobileNavBtn" onclick="openDrawer()" title="Navigazione">☰</button>

<div class="main">
  <nav class="sidenav" id="sidenav"></nav>
  <div class="content" id="content"></div>
</div>

<script>
// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
let currentPage = 'gilde'; // 'gilde' | 'licenze'
let currentSection = 'panoramica';

const PAGES = ['gilde', 'licenze'];

const NAV = {
  gilde: [
    { id:'panoramica',  label:'📖 Panoramica' },
    { id:'impresa',     label:'🏢 Imprese' },
    { id:'fondazione',  label:'📜 Fondazione' },
    { id:'tipologie',   label:'⚒️ Tipologie' },
    { id:'gestione',    label:'💰 Gestione' },
    { id:'sede',        label:'🏗️ Sede Fisica' },
    { id:'gilda',       label:'🏛️ Costituzione Gilda' },
    { id:'benefici',    label:'✦ Benefici Gilda' },
    { id:'sanzioni',    label:'⚠️ Sanzioni' },
    { id:'costi',       label:'🪙 Riepilogo Costi' },
  ],
  licenze: [
    { id:'panoramica',  label:'📖 Panoramica' },
    { id:'vantaggi',    label:'✦ Vantaggi' },
    { id:'quadro',      label:'📋 Quadro Patenti' },
    { id:'pmc',         label:'🟢 P.M.C.' },
    { id:'pmt',         label:'🔵 P.M.T.' },
    { id:'pasv',        label:'🟠 P.A.S.V.' },
    { id:'poe',         label:'🟡 P.O.E.' },
    { id:'inchiostri',  label:'🖋️ Inchiostri' },
  ],
};

// ════════════════════════════════════════════════
//  MOBILE
// ════════════════════════════════════════════════
function openDrawer() { document.getElementById('mobileDrawer').classList.add('open'); document.getElementById('drawerOverlay').classList.add('open'); document.body.style.overflow = 'hidden'; }
function closeDrawer() { document.getElementById('mobileDrawer').classList.remove('open'); document.getElementById('drawerOverlay').classList.remove('open'); document.body.style.overflow = ''; }
function syncMobile() { const d = document.getElementById('mobileDrawerNav'); const s = document.getElementById('sidenav'); if (d && s) d.innerHTML = s.innerHTML; }

// ════════════════════════════════════════════════
//  RENDER TABS
// ════════════════════════════════════════════════
function renderTabs() {
  const labels = { gilde:'🏛️ Gilde &amp; Imprese', licenze:'⚖️ Licenze &amp; Patenti' };
  const el = document.getElementById('tabs');
  el.innerHTML = PAGES.map(p =>
    `<button class="tab-btn ${p===currentPage?'active':''}" onclick="setPage('${p}')">${labels[p]}</button>`
  ).join('');
}

// ════════════════════════════════════════════════
//  RENDER SIDENAV
// ════════════════════════════════════════════════
function renderSideNav() {
  const el = document.getElementById('sidenav');
  const nav = NAV[currentPage];
  let h = '<div class="sidenav-section"><div class="sidenav-title">Sezioni</div>';
  nav.forEach(n => {
    h += `<button class="sidenav-btn ${currentSection===n.id?'active':''}" onclick="setSection('${n.id}')">${n.label}</button>`;
  });
  h += '</div>';
  el.innerHTML = h;
}

// ════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════
function sectionTitle(icon, label) {
  return `<div class="doc-section-title">${icon} ${label}</div>`;
}
function tableWrap(inner) { return `<div class="table-wrap">${inner}</div>`; }

// ════════════════════════════════════════════════
//  RENDER GILDE
// ════════════════════════════════════════════════
const RENDER_GILDE = {

panoramica: () => `
  <div class="page-hero gilde">
    <h2>🏛️ Codice delle Imprese e delle Gilde<br><small style="font-size:.55em;color:var(--text3);letter-spacing:.08em">Camera del Commercio e dei Mestieri — Arcadia</small></h2>
    <p>Il presente Codice regola la <strong style="color:var(--gold)">costituzione, l'operatività e lo scioglimento</strong> delle Imprese e delle Gilde nel regno di Arcadia.<br>
    Un'<strong style="color:var(--gold)">Impresa</strong> è una società formale tra due o più personaggi con sede fisica, capacità produttiva condivisa e responsabilità collettiva verso l'U.R.V. e il Marchesato.<br>
    Una <strong style="color:var(--gold2)">Gilda</strong> è invece un'associazione di categoria che raggruppa più Imprese o artigiani indipendenti sotto un marchio comune, con accesso a privilegi esclusivi.</p>
  </div>

  <div class="doc-section">
    ${sectionTitle('⚖️', 'Impresa vs Gilda — Differenze Fondamentali')}
    ${tableWrap(`<table>

impresa: () => `
  <div class="doc-section">
    ${sectionTitle('🏢', '2. Costituzione di un\'Impresa')}
    <p style="color:var(--text2);font-size:.92rem;margin-bottom:16px;line-height:1.6">Fondare un'Impresa ad Arcadia è un atto giuridico formale. Non basta accordarsi tra avventurieri: serve carta, sigillo e struttura.</p>

    <h4 style="font-family:'Uncial Antiqua',serif;color:var(--gold);font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px">2.1 Requisiti per la Fondazione</h4>
    ${tableWrap(`<table>
      <thead><tr><th>Requisito</th><th>Dettaglio</th></tr></thead>
      <tbody>
        <tr><td>Numero Soci</td><td>Minimo 2, massimo 6 PG fondatori. Possono essere ammessi soci di minoranza successivamente.</td></tr>
        <tr><td>Patente Attiva</td><td>Almeno il <strong>50% dei soci fondatori</strong> deve possedere una Patente valida (P.M.C., P.M.T., P.A.S.V. o P.O.E.).</td></tr>
        <tr><td>Sede Fisica</td><td>Almeno una struttura LV1 costruita da un Architetto iscritto alla Camera del Commercio. Minimo consigliato: <strong>Magazzino (150 Mo) + Cucina (70 Mo)</strong>.</td></tr>
        <tr><td>Atto Costitutivo</td><td>Documento scritto e firmato da tutti i soci, con: nome dell'Impresa, mestieri esercitati, quote di partecipazione, nome del Responsabile, sede legale.</td></tr>
        <tr><td>Tassa di Registrazione</td><td><strong>75 Mo</strong> (una tantum). Include: emissione del Timbro d'Impresa, iscrizione al Registro delle Imprese, copia autenticata dell'Atto.</td></tr>
        <tr><td>Fondo Iniziale</td><td>Cassa comune di avvio: minimo <strong>50 Mo</strong> versati collettivamente. Serve come garanzia per i primi fornitori.</td></tr>
      </tbody>
    </table>`)}

    <h4 style="font-family:'Uncial Antiqua',serif;color:var(--gold);font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;margin:20px 0 10px">2.2 Procedura di Registrazione</h4>
    <div class="rules-grid" style="grid-template-columns:repeat(auto-fill,minmax(200px,1fr))">
      ${[
        ['1️⃣','Atto Costitutivo','I soci redigono l\'Atto in triplice copia: una per la Camera del Commercio, una per l\'U.R.V., una per l\'Impresa.'],
        ['2️⃣','Presentazione','Il Responsabile si presenta fisicamente alla Camera del Commercio con l\'Atto e le Patenti di tutti i soci.'],
        ['3️⃣','Verifica','Il funzionario verifica i requisiti ed emette il Certificato di Impresa e il Timbro d\'Impresa in ottone.'],
        ['4️⃣','Iscrizione','L\'Impresa viene inscritta nel Registro Pubblico delle Imprese di Arcadia (consultabile da chiunque).'],
        ['5️⃣','Notifica U.R.V.','La Camera del Commercio notifica l\'U.R.V., che aggiorna i fascicoli delle Patenti di ciascun socio.'],
      ].map(([n,t,d]) => `<div class="rule-box"><h4>${n} ${t}</h4><p>${d}</p></div>`).join('')}
    </div>

    <h4 style="font-family:'Uncial Antiqua',serif;color:var(--gold);font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;margin:20px 0 10px">2.3 Struttura Interna Obbligatoria</h4>
    ${tableWrap(`<table>
      <thead><tr><th>Ruolo</th><th>Funzioni e Responsabilità</th></tr></thead>
      <tbody>
        <tr><td>Responsabile</td><td>Firma l'Atto Costitutivo. Rappresenta legalmente l'Impresa davanti all'U.R.V. e alla Camera del Commercio. In caso di infrazioni, risponde personalmente in prima istanza.</td></tr>
        <tr><td>Resp. Finanziario</td><td>Gestisce la cassa comune, tiene il Registro delle Entrate e Uscite. Può coincidere col Responsabile in Imprese con meno di 3 soci.</td></tr>
        <tr><td>Mastro Artigiano</td><td>Il socio col livello di mestiere più alto. Coordina la produzione, approva l'uso dei materiali vincolati, firma il Libretto degli Acquisti per conto dell'Impresa.</td></tr>
        <tr><td>Soci Ordinari</td><td>Contribuiscono con Downtime, risorse e competenze. Partecipano ai profitti secondo le quote stabilite nell'Atto Costitutivo.</td></tr>
        <tr><td>Apprendisti (opz.)</td><td>PG con Mestiere LV1 o NPC assunti. Non possono firmare documenti legali. Max 2 per ogni socio con P.O.E., max 1 per ogni socio con P.M.T./P.A.S.V.</td></tr>
      </tbody>
    </table>`)}
  </div>`,

fondazione: () => `

//  RENDER CONTENT
// ════════════════════════════════════════════════
function renderContent() {
  const el = document.getElementById('content');
  const map = currentPage === 'gilde' ? RENDER_GILDE : RENDER_LICENZE;
  const fn = map[currentSection];
  el.innerHTML = fn ? fn() : '<div style="color:var(--text3);padding:40px;text-align:center">Sezione non trovata.</div>';
}

// ════════════════════════════════════════════════
//  STATE SETTERS
// ════════════════════════════════════════════════
function setPage(p) {
  currentPage = p;
  currentSection = 'panoramica';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function setSection(s) {
  currentSection = s;
  render();
  closeDrawer();
  window.scrollTo({top:0,behavior:'smooth'});
}

function render() {
  renderTabs();
  renderSideNav();
  renderContent();
  syncMobile();
  const btn = document.getElementById('mobileNavBtn');
  if (btn) btn.style.display = 'flex';
}

render();
</script>
